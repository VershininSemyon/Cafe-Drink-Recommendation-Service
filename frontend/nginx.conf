
server {
    listen 5000;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html =404;
    }

    include /etc/nginx/extra-conf.d/*.conf;
}

gzip on;
gzip_comp_level 6;

gzip_types 
    text/plain
    text/css
    text/javascript
    application/javascript
;
