
services:
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: always
    networks:
      - dbnet
    ports:
      - "5000:5000"
    depends_on:
      - backend

  backend:
    build: ./backend
    command: >
      sh -c "
            python manage.py collectstatic --noinput &&
            python manage.py makemigrations &&
            python manage.py migrate &&
            gunicorn -c gunicorn.py config.wsgi"

    container_name: backend
    user: "1000:1000"
    restart: always
    env_file:
      - .env
    links:
      - "postgres:db"
    volumes:
      - ./backend:/app/backend
      - ./backend/staticfiles:/app/backend/staticfiles
    networks:
      - dbnet
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    container_name: postgresql_database
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - dbnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4.8.1
    container_name: adminer
    ports:
      - "8080:8080"
    links:
      - "postgres:db"
    networks:
      - dbnet
    depends_on:
      - postgres
  
  redis:
    image: redis:8.0-alpine
    container_name: redis_database
    networks:
      - dbnet
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  redis_monitoring:
    image: redis/redisinsight:3.0.3
    container_name: redis_monitoring
    restart: always
    ports:
      - "5540:5540"
    environment:
      - REDISINSIGHT_REDIS_URLS=redis://:${REDIS_PASSWORD}@redis:6379
    networks:
      - dbnet
    depends_on:
      - redis

  celery:
    build: ./backend
    container_name: celery
    restart: always
    env_file:
      - .env
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app/backend
    networks:
      - dbnet
    links:
      - "postgres:db"
      - "redis:redis"
    depends_on:
      - redis
      - postgres
      - backend

  flower:
    build: ./backend
    container_name: flower
    restart: always
    env_file:
      - .env
    command: >
      celery -A config flower 
      --port=5555 
      --broker=redis://:${REDIS_PASSWORD}@redis:6379/0
      --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    networks:
      - dbnet
    depends_on:
      - redis
      - celery

  nginx:
    image: nginx:1.26.0-alpine
    container_name: nginx
    restart: always
    networks:
      - dbnet
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html/frontend
      - ./backend/staticfiles:/app/backend/staticfiles
    expose:
      - 8088
    ports:
      - "80:8088"
    depends_on:
      - backend
      - frontend

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - dbnet
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: always
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    networks:
      - dbnet
    depends_on:
      - prometheus


volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:


networks:
  dbnet:
    driver: bridge
